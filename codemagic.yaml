workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    
    integrations:
      app_store_connect: Saman Marketpalce
    
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.saeed.saman
      
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_ID: 6744526430
      
      node: 20
      xcode: latest
      cocoapods: default
    
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
          source: true
    
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      
      - name: Build web app
        script: |
          npm run build
      
      - name: Add iOS platform
        script: |
          npx cap add ios || true
      
      - name: Capacitor sync
        script: |
          npx cap sync ios
      
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      
      - name: Set up code signing
        script: |
          set -e
          keychain initialize

          # DEBUG: confirm the App Store Connect integration injected env vars
          echo "=== App Store Connect env var check ==="
          echo "APP_STORE_CONNECT_KEY_IDENTIFIER set? ${APP_STORE_CONNECT_KEY_IDENTIFIER:+YES}${APP_STORE_CONNECT_KEY_IDENTIFIER:-NO}"
          echo "APP_STORE_CONNECT_ISSUER_ID set? ${APP_STORE_CONNECT_ISSUER_ID:+YES}${APP_STORE_CONNECT_ISSUER_ID:-NO}"
          echo "APP_STORE_CONNECT_PRIVATE_KEY length: ${#APP_STORE_CONNECT_PRIVATE_KEY}"
          echo "======================================="

          # Generate a fresh RSA private key for the distribution certificate.
          # Codemagic CLI's `certificates create` does NOT auto-generate this —
          # it errors out with "Cannot create resource without certificate
          # private key" unless we supply one explicitly.
          # Generate a fresh RSA private key and export its CONTENT (not path)
          # via the env var the CLI reads by default. The CLI uses this key to
          # build a CSR internally, submits it to App Store Connect, and gets
          # back a signed cert paired with this key.
          openssl genrsa 2048 > /tmp/ios_dist_key.pem
          export CERTIFICATE_PRIVATE_KEY="$(cat /tmp/ios_dist_key.pem)"
          echo "Generated cert private key, content length: ${#CERTIFICATE_PRIVATE_KEY} chars"

          # Create a brand-new Apple Distribution certificate.
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --certificate-key "$CERTIFICATE_PRIVATE_KEY" \
            --save

          # Fetch (or create) the App Store provisioning profile, matching it
          # against the cert + key we just created.
          app-store-connect fetch-signing-files "com.saeed.saman" \
            --type IOS_APP_STORE \
            --certificate-key "$CERTIFICATE_PRIVATE_KEY" \
            --create

          # keychain add-certificates auto-discovers the .p12 saved by the
          # previous steps in ~/Library/Developer/Xcode/UserData/Certificates.
          # It does NOT accept --certificate-key.
          keychain add-certificates

          # Install the fetched profile into the Xcode project (writes Manual
          # signing config pointing to the fresh profile).
          xcode-project use-profiles

          # DEBUG: list what was actually installed
          echo "=== Installed profiles ==="
          for p in ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision; do
            [ -f "$p" ] || continue
            echo "--- $p ---"
            security cms -D -i "$p" 2>/dev/null | grep -A1 -E "<key>(Name|UUID|com.apple.developer.associated-domains)</key>" || true
          done
          echo "========================="
      
      - name: Set version and build number
        script: |
          cd $CM_BUILD_DIR/ios/App
          # Set version to 2.0.6 (in-app review prompt)
          agvtool new-marketing-version 2.0.6
          # Get latest build number from App Store Connect and increment
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-build-number "$APP_ID" --platform IOS 2>/dev/null || echo "20")
          NEW_BUILD=$((LATEST_BUILD_NUMBER + 1))
          # Ensure build number is higher than any previously used
          if [ $NEW_BUILD -lt 90 ]; then NEW_BUILD=90; fi
          echo "Setting build number to $NEW_BUILD"
          agvtool new-version -all $NEW_BUILD
      
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
      
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-release:
    name: Android Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    environment:
      vars:
        PACKAGE_NAME: "com.saeed.saman"
      java: 21
      node: 20
    
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      
      - name: Build web app
        script: |
          npm run build
      
      - name: Add Android platform
        script: |
          npx cap add android || true
      
      - name: Capacitor sync
        script: |
          npx cap sync android
      
      - name: Set up signing keystore
        script: |
          # Use the upload keystore included in the repo
          cat > $CM_BUILD_DIR/android/key.properties <<EOF
          storePassword=saman2024
          keyPassword=saman2024
          keyAlias=upload
          storeFile=$CM_BUILD_DIR/android/app/upload-key.keystore
          EOF
      
      - name: Build Android Release AAB
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
    
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk
    
    publishing:
      email:
        recipients:
          - saeed.hokal@hotmail.com
        notify:
          success: true
          failure: true
