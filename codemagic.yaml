workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    
    integrations:
      app_store_connect: Saman Marketpalce
    
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.saeed.saman
      
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_ID: 6744526430
      
      node: 20
      xcode: latest
      cocoapods: default
    
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
          source: true
    
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      
      - name: Build web app
        script: |
          npm run build
      
      - name: Add iOS platform
        script: |
          npx cap add ios || true
      
      - name: Capacitor sync
        script: |
          npx cap sync ios
      
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          # NOTE: we intentionally do NOT run `xcode-project use-profiles` here.
          # That command picks a stale/bad cached profile ("Saeed Distrubution 2")
          # missing the Associated Domains entitlement. Instead, the Build IPA
          # step below uses xcodebuild with -allowProvisioningUpdates, which
          # lets Xcode auto-create a fresh profile via App Store Connect API
          # that includes all current capabilities on the App ID.
      
      - name: Set version and build number
        script: |
          cd $CM_BUILD_DIR/ios/App
          # Set version to 2.0.4 (Firebase Analytics for Google Ads iOS tracking)
          agvtool new-marketing-version 2.0.5
          # Get latest build number from App Store Connect and increment
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-build-number "$APP_ID" --platform IOS 2>/dev/null || echo "20")
          NEW_BUILD=$((LATEST_BUILD_NUMBER + 1))
          # Ensure build number is higher than any previously used
          if [ $NEW_BUILD -lt 90 ]; then NEW_BUILD=90; fi
          echo "Setting build number to $NEW_BUILD"
          agvtool new-version -all $NEW_BUILD
      
      - name: Build IPA
        script: |
          set -e
          ARCHIVE_PATH="$CM_BUILD_DIR/build/ios/xcarchive/App.xcarchive"
          EXPORT_PATH="$CM_BUILD_DIR/build/ios/ipa"
          mkdir -p "$EXPORT_PATH"

          # Codemagic exposes the App Store Connect API private key as the
          # variable APP_STORE_CONNECT_PRIVATE_KEY (the key content). xcodebuild
          # needs a file path, so write it out.
          AUTH_KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          mkdir -p "$(dirname "$AUTH_KEY_PATH")"
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > "$AUTH_KEY_PATH"
          chmod 600 "$AUTH_KEY_PATH"

          # Archive with Automatic signing + -allowProvisioningUpdates so Xcode
          # talks to App Store Connect API and creates/refreshes a profile that
          # matches the current entitlements (incl. Associated Domains).
          xcodebuild -workspace "$CM_BUILD_DIR/$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$AUTH_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            DEVELOPMENT_TEAM=KQ542Q98H2 \
            CODE_SIGN_STYLE=Automatic \
            archive

          # Export the .ipa from the archive.
          cat > /tmp/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>KQ542Q98H2</string>
            <key>signingStyle</key><string>automatic</string>
            <key>uploadSymbols</key><true/>
            <key>compileBitcode</key><false/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$AUTH_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"
    
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
      
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-release:
    name: Android Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    environment:
      vars:
        PACKAGE_NAME: "com.saeed.saman"
      java: 21
      node: 20
    
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      
      - name: Build web app
        script: |
          npm run build
      
      - name: Add Android platform
        script: |
          npx cap add android || true
      
      - name: Capacitor sync
        script: |
          npx cap sync android
      
      - name: Set up signing keystore
        script: |
          # Use the upload keystore included in the repo
          cat > $CM_BUILD_DIR/android/key.properties <<EOF
          storePassword=saman2024
          keyPassword=saman2024
          keyAlias=upload
          storeFile=$CM_BUILD_DIR/android/app/upload-key.keystore
          EOF
      
      - name: Build Android Release AAB
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
    
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk
    
    publishing:
      email:
        recipients:
          - saeed.hokal@hotmail.com
        notify:
          success: true
          failure: true
