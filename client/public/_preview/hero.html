<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Saman Hero Card Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#06090d;
    --card-from:#13181f;
    --card-to:#0a0d12;
    --orange:#f97316;
    --orange-deep:#ea580c;
    --text:#ffffff;
    --muted:#9aa3ad;
    --border:rgba(255,255,255,0.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;-webkit-font-smoothing:antialiased}
  body{display:flex;justify-content:center;padding:32px 0;min-height:100vh}
  .phone{width:390px;background:var(--bg);padding:18px 16px 0;border-radius:42px;border:1px solid var(--border);box-shadow:0 30px 80px rgba(0,0,0,0.6)}
  /* top row */
  .top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px}
  .greet .hey{color:var(--muted);font-size:14px;font-weight:500;margin-bottom:2px}
  .greet .welcome{font-size:22px;font-weight:700;letter-spacing:-0.01em}
  .greet .welcome .brand{color:var(--orange)}
  .icons{display:flex;gap:10px;align-items:center}
  .ibtn{width:38px;height:38px;border-radius:50%;background:#15191f;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:#e6e8eb;position:relative}
  .ibtn svg{width:18px;height:18px}
  .badge{position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);background:var(--orange);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:9px;letter-spacing:.04em;line-height:1}
  .notif-dot{position:absolute;top:6px;right:6px;background:var(--orange);color:#fff;font-size:10px;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #06090d}
  .avatar{width:38px;height:38px;border-radius:50%;background-image:url('./skyline.png');background-size:cover;background-position:center;border:1px solid var(--border)}
  /* hero card */
  .hero{
    position:relative;border-radius:24px;overflow:hidden;
    background:linear-gradient(180deg,var(--card-from),var(--card-to));
    border:1px solid var(--border);min-height:230px;
    box-shadow:0 10px 30px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.04);
  }
  .hero .bg{
    position:absolute;inset:0;
    background-image:linear-gradient(90deg, rgba(10,13,18,0.95) 0%, rgba(10,13,18,0.65) 50%, rgba(10,13,18,0.35) 100%), url('./skyline.png');
    background-size:cover;background-position:center 60%;
    filter:saturate(0.95);
  }
  .hero .content{position:relative;padding:22px 22px 20px;display:flex;flex-direction:column;height:100%;min-height:230px;justify-content:space-between}
  .eyebrow{color:var(--orange);font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase}
  .title{margin-top:10px;font-size:24px;font-weight:800;letter-spacing:-0.02em;line-height:1.15;max-width:60%}
  .sub{margin-top:8px;color:#c8ccd1;font-size:13px;line-height:1.45;max-width:62%}
  .cta{
    margin-top:16px;display:inline-flex;align-items:center;gap:10px;
    background:linear-gradient(180deg,var(--orange) 0%, var(--orange-deep) 100%);
    color:#fff;font-weight:700;font-size:14px;padding:12px 18px;border-radius:999px;border:none;
    width:max-content;box-shadow:0 8px 20px rgba(249,115,22,0.35);
  }
  .cta .arr{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center}
  .cta .arr svg{width:12px;height:12px}
  .logo{
    position:absolute;right:14px;bottom:18px;width:170px;opacity:.95;
    filter:drop-shadow(0 6px 16px rgba(0,0,0,.45));
  }
</style>
</head>
<body>
<div class="phone">
  <div class="top">
    <div class="greet">
      <div class="hey">Hey, Saeed</div>
      <div class="welcome">Welcome to <span class="brand">Saman</span></div>
    </div>
    <div class="icons">
      <div class="ibtn" title="theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      </div>
      <div class="ibtn" title="language">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>
        <span class="badge">AED</span>
      </div>
      <div class="ibtn" title="notifications">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
        <span class="notif-dot">4</span>
      </div>
      <div class="avatar" title="profile"></div>
    </div>
  </div>

  <div class="hero">
    <div class="bg"></div>
    <div class="content">
      <div>
        <div class="eyebrow">UAE's Marketplace</div>
        <div class="title">Powering the UAE Auto Market</div>
        <div class="sub">Buy, sell and discover cars and parts with confidence.</div>
      </div>
      <button class="cta">
        Start Selling
        <span class="arr">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </span>
      </button>
    </div>
  </div>
</div>
</body>
</html>
